<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>Stremio Web App</title>
    
    <!-- Mobil Uygulama (PWA) Görünüm Ayarları -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    
    <style>
        /* Tarayıcı varsayılanlarını sıfırlama */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0c091f; /* Stremio koyu arka plan teması */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* Ana Taşıyıcı */
        .app-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* Üst Menü / Navigasyon Alanı */
        .app-header {
            height: 50px;
            background-color: #110e2e;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            border-bottom: 1px solid #1f1b44;
            z-index: 10;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #ffffff;
            font-weight: 700;
            font-size: 1.1rem;
            text-decoration: none;
        }

        .brand img {
            height: 24px;
        }

        .btn-launch {
            background-color: #7b51db;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s;
        }

        .btn-launch:hover {
            background-color: #6339c0;
        }

        /* Iframe ve İçerik Alanı */
        .content-area {
            flex: 1;
            width: 100%;
            height: 100%;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* iframe engelleme uyarısı için yedek ekran */
        .fallback-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            color: #e5e5e5;
            z-index: 1;
        }

        .fallback-screen h2 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: #ffffff;
        }

        .fallback-screen p {
            font-size: 0.95rem;
            margin-bottom: 20px;
            max-width: 400px;
            line-height: 1.4;
            color: #a0a0c0;
        }

        .btn-direct {
            background: #7b51db;
            color: white;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 30px;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(123, 81, 219, 0.4);
            transition: transform 0.2s, background 0.2s;
        }

        .btn-direct:hover {
            background: #6339c0;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Web App Üst Barı -->
        <header class="app-header">
            <a href="#" class="brand">
                <span style="color: #7b51db;">●</span> Stremio Web Player
            </a>
            <a href="https://web.stremio.com/#/discover" target="_blank" class="btn-launch">Tam Ekran Aç</a>
        </header>

        <!-- İçerik Alanı -->
        <div class="content-area">
            <!-- Arka planda iframe yüklenmeye çalışır -->
            <!-- Not: CSP engellerse, aşağıdaki yönlendirme kartı kullanıcıyı doğrudan uygulamaya taşır -->
            <iframe 
                src="https://web.stremio.com/#/discover" 
                allow="autoplay; encrypted-media; picture-in-picture; fullscreen" 
                sandbox="allow-scripts allow-same-origin allow-forms allow-popups">
            </iframe>

            <!-- Iframe engellendiğinde arkada görünecek şık yönlendirme kartı -->
            <div class="fallback-screen">
                <h2>Stremio Web Discover</h2>
                <p>Güvenlik politikaları gereği Stremio doğrudan iframe içinde açılmayabilir. En iyi responsive deneyim için aşağıdaki butona tıklayarak uygulamayı başlatın.</p>
                <a href="https://web.stremio.com/#/discover" target="_blank" class="btn-direct">Uygulamaya Git</a>
            </div>
        </div>
    </div>

</body>
</html>
