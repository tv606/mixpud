<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <link rel="apple-touch-icon" sizes="180x180" href="icons/tv.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="WEB TV">
    <title>WEB TV</title>
    
    <!-- Video.js CSS -->
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #080b11;
            color: #f3f4f6;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

         html {
             scrollbar-color: #8b5cf6 #1e1b4b;
        }

        /* 1. MOBİL İÇİN VİDEO BÖLÜMÜ (Masaüstünde flex-direction değişecek) */
        .player-section {
            width: 100%;
            background-color: #000;
            position: relative;
            z-index: 10;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
        }

        .player-wrapper {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
        }

        .video-js {
            width: 100% !important;
            height: 100% !important;
        }

        .info-bar {
            background: #0d1321;
            padding: 12px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .info-bar h1 {
            font-size: 1rem;
            font-weight: 700;
            background: linear-gradient(90deg, #fff, #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .current-badge {
            font-size: 1.2rem;
            background: rgba(59, 130, 246, 0.1);
            border: 2px solid rgba(59, 130, 246, 0.3);
            color: #fff;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 600;
        }

        /* 2. KANAL LİSTESİ BÖLÜMÜ */
        .content-section {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            -webkit-overflow-scrolling: touch;
        }

        .section-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #4b5563;
            margin-bottom: 15px;
            font-weight: 700;
        }

        .channel-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-bottom: 40px;
        }

        .channel-card {
            display: flex;
            align-items: center;
            padding: 12px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            cursor: pointer;
            outline: none;
            transition: all 0.2s ease;
        }

        .channel-card:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: #ffffff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
            transform: scale(1.02);
        }

        .channel-card.active {
            background: linear-gradient(90deg, rgba(30, 58, 138, 0.6) 0%, rgba(17, 24, 39, 0.8) 100%);
            border-color: #3b82f6;
            
        }

        .logo-container {
            width: 48px;
            height: 48px;
            border-radius: 10px;
            background: #000;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 16px;
            flex-shrink: 0;
        }

        .channel-logo {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .channel-name {
            font-size: 0.95rem;
            font-weight: 600;
        }

        .channel-type {
            font-size: 0.75rem;
            color: #6b7280;
            margin-top: 2px;
        }

        /* ==========================================================================
           MASAÜSTÜ AYARLARI (Yenilenmiş Sinematik Tam Ekran Düzeni)
           ========================================================================== */
        @media (min-width: 992px) {
            body { 
                flex-direction: row-reverse; /* Listeyi sağa, videoyu sola dev ekran olarak yaslar */
            }

            /* Video Alanı: Artık ufacık değil, listenin dışındaki tüm dev alanı kaplar */
            .player-section { 
                flex: 1; 
                height: 100vh; 
                padding: 0; 
                background: #000;
                box-shadow: none;
            }

            /* Video kutusu tüm ekranı dolduracak şekilde esnetildi */
            .player-wrapper { 
                flex: 1;
                height: calc(100vh - 55px); /* Bilgi çubuğu yüksekliği düşüldü */
                aspect-ratio: auto; /* Sabit 16:9 oran zorlamasını kaldırıp tam ekran yaptık */
            }

            .info-bar { 
                height: 55px;
                background: #06080c; 
                border-top: 1px solid rgba(255, 255, 255, 0.05);
                border-bottom: none;
            }

            /* Kanal Listesi: Sol veya sağ tarafta sabit 380px sütun olarak kalır */
            .content-section { 
                width: 380px; 
                max-width: 380px; 
                height: 100vh;
                background: #0d1321; 
                border-right: 1px solid rgba(255, 255, 255, 0.05); 
                border-left: none;
            }

            .channel-card:hover {
                background: rgba(255, 255, 255, 0.05);
                border-color: rgba(255, 255, 255, 0.15);
            }
        }


          

    




    </style>
</head>

       let activeFocusIndex = 0;

const player = videojs('main-tv-player', {
    fluid: false, 
    fill: true,   
    techOrder: ["html5", "youtube"],
    youtube: { "iv_load_policy": 3, "modestbranding": 1 }
});

const gridContainer = document.getElementById('channelGrid');
const currentTrackBadge = document.getElementById('currentTrack');

function initApp() {
    channels.forEach((channel, idx) => {
        const card = document.createElement('div');
        card.className = `channel-card ${idx === 0 ? 'active' : ''}`;
        card.setAttribute('tabindex', '0'); 
        card.setAttribute('data-index', idx);

        card.innerHTML = `
            <div class="logo-container">
                <img src="${channel.logo}" class="channel-logo" alt="${channel.name}" onerror="this.src='https://via.placeholder.com/50?text=TV'">
            </div>
            <div class="channel-details">
                <div class="channel-name">${channel.name}</div>
                <div class="channel-type">${channel.type === 'youtube' ? 'YouTube' : 'Live Stream'}</div>
            </div>
        `;

        card.addEventListener('click', () => { selectChannel(idx); });
        card.addEventListener('focus', () => { activeFocusIndex = idx; });
        gridContainer.appendChild(card);
    });

    // İlk açılışta ilk kanalı yükle ama OYNATMA (false gönderdik)
    if(channels.length > 0) playStream(channels[0], false);
    
    setTimeout(() => {
        const initialFocus = document.querySelector('.channel-card');
        if(initialFocus) initialFocus.focus();
    }, 500);
}

function selectChannel(idx) {
    document.querySelectorAll('.channel-card').forEach(c => c.classList.remove('active'));
    const cards = document.querySelectorAll('.channel-card');
    if(cards[idx]) {
        cards[idx].classList.add('active');
        playStream(channels[idx], true); // Kullanıcı seçince OYNAT (true gönderdik)
    }
}

function playStream(channel, shouldPlay = true) {
    currentTrackBadge.innerText = channel.name;
    if (channel.type === "youtube") {
        player.src({ src: channel.url, type: "video/youtube" });
    } else {
        player.src({ src: channel.url, type: "application/x-mpegURL" });
    }
    
    // Sadece true gelirse otomatik oynatmayı dener
    if (shouldPlay) {
        player.ready(() => {
            player.play().catch(() => console.log("Oynatma başlatılamadı"));
        });
    }
}

// TV Kumandası Tuş Kombinasyonları
document.addEventListener('keydown', function(e) {
    const cards = document.querySelectorAll('.channel-card');
    switch(e.key) {
        case 'ArrowDown':
            e.preventDefault();
            if (activeFocusIndex < cards.length - 1) {
                activeFocusIndex++;
                cards[activeFocusIndex].focus();
                cards[activeFocusIndex].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
            break;
        case 'ArrowUp':
            e.preventDefault();
            if (activeFocusIndex > 0) {
                activeFocusIndex--;
                cards[activeFocusIndex].focus();
                cards[activeFocusIndex].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
            break;
        case 'Enter':
            e.preventDefault();
            selectChannel(activeFocusIndex);
            break;
    }
});

document.addEventListener('DOMContentLoaded', initApp);
    </script>
