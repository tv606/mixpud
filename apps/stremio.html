<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stremio Katalog Keşif</title>
    <style>
        :root {
            --bg-color: #0c091f;
            --card-bg: #151138;
            --text-color: #ffffff;
            --text-muted: #a0a0c0;
            --primary: #7b51db;
            --primary-hover: #6339c0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }

        header , .info {
            max-width: 1200px;
            margin: 0 auto 30px auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        @media (min-width: 600px) {
            header {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
            }
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .logo span {
            color: var(--primary);
        }

        /* Kategori Seçici */
        .filter-group {
            display: flex;
            gap: 10px;
        }

        .btn {
            background-color: var(--card-bg);
            color: var(--text-color);
            border: 1px solid #1f1b44;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        .btn.active, .btn:hover {
            background-color: var(--primary);
            border-color: var(--primary);
        }

        /* Kart Izgarası (Responsive Grid) */
        .catalog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
        }

        @media (min-width: 480px) {
            .catalog-grid {
                grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
                gap: 20px;
            }
        }

        /* Katalog Kart Tasarımı */
        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
        }

        .poster-wrapper {
            position: relative;
            padding-top: 150%; /* 2:3 Afiş Oranı */
            background-color: #1a163a;
            overflow: hidden;
        }

        .poster-wrapper img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.3s;
        }

        .card-info {
            padding: 12px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            justify-content: space-between;
        }

        .card-title {
            font-size: 0.95rem;
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: 6px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            height: 2.6em; /* Çift satır yüksekliğini sabitler */
        }

        .card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .rating {
            background-color: rgba(255, 193, 7, 0.15);
            color: #ffc107;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
        }

        /* Yükleniyor Göstergesi */
        .loader {
            grid-column: 1 / -1;
            text-align: center;
            padding: 50px 0;
            color: var(--text-muted);
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">STREMIO<span>.KATALOG</span></div>
        <div class="filter-group">
            <button class="btn active" onclick="loadCatalog('movie')">Filmler</button>
            <button class="btn" onclick="loadCatalog('series')">Diziler</button>
        </div>
    </header>
    <div class="info">Önce yukarıdaki menüden bir seçim yapın. Bu katalog Stremio'ya son gelen dizileri ve filmleri listeler.</div>
    <main class="catalog-grid" id="catalog-grid">
        <div class="loader">Katalog yükleniyor...</div>
    
    </main>

    <script>
        // Stremio'nun resmi v3 Cinemeta API adresi
        const API_URL = "https://v3-cinemeta.strem.io/catalog";

        async function loadCatalog(type) {
            const grid = document.getElementById('catalog-grid');
            grid.innerHTML = '<div class="loader">Yükleniyor..</div>';
            
            // Buton aktiflik durumlarını güncelle
            document.querySelectorAll('.btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            try {
                // Stremio popüler içerikler kataloğunu çekiyoruz
                const response = await fetch(`${API_URL}/${type}/top.json`);
                const data = await response.json();
                
                grid.innerHTML = ''; // Temizle

                if (data && data.metas) {
                    data.metas.forEach(item => {
                        // Poster görseli yoksa boş şablon yerine yedek görsel ayarla
                        const poster = item.poster || 'https://via.placeholder.com/300x450/151138/ffffff?text=Resim+Yok';
                        const rating = item.imdbRating ? `★ ${item.imdbRating}` : 'N/A';
                        const year = item.year || 'Bilinmiyor';

                        const card = document.createElement('div');
                        card.className = 'card';
                        card.innerHTML = `
                            <div class="poster-wrapper">
                                <img src="${poster}" alt="${item.name}" loading="lazy">
                            </div>
                            <div class="card-info">
                                <h3 class="card-title" title="${item.name}">${item.name}</h3>
                                <div class="card-meta">
                                    <span>${year}</span>
                                    <span class="rating">${rating}</span>
                                </div>
                            </div>
                        `;
                        grid.appendChild(card);
                    });
                } else {
                    grid.innerHTML = '<div class="loader">Hiçbir içerik bulunamadı.</div>';
                }
            } catch (error) {
                console.error("Katalog çekme hatası:", error);
                grid.innerHTML = '<div class="loader">Veriler yüklenirken bir hata oluştu.</div>';
            }
        }

        // Sayfa açıldığında varsayılan olarak Popüler Filmleri getir
        window.onload = () => {
            loadCatalog('movie');
        };
    </script>
</body>
</html>
