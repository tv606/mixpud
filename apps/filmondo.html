<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Filmondo</title>
    <style>
        :root {
            --bg: #080808;
            --surface: #121212;
            --accent: #00d2ff;
            --text: #ffffff;
            --text-dim: #888;
            --card-gap: 12px;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
            flex-direction: column;
            overflow: hidden;
        }

        main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        #sidebar {
            width: 380px;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            border-right: 1px solid #1a1a1a;
        }

        .side-header { padding: 20px; font-weight: 800; color: var(--accent); letter-spacing: 1px; }
        
        .search-wrapper { padding: 0 20px 15px 20px; }
        #searchBox {
            width: 100%;
            padding: 12px 15px;
            background: var(--surface);
            border: 1px solid #222;
            border-radius: 12px;
            color: white;
            outline: none;
        }

        #playlist-container {
            flex: 1;
            overflow-y: auto;
            position: relative;
            padding: 0 15px;
        }

        #virtual-list { position: relative; width: 100%; }

        .playlist-item {
            position: absolute;
            width: 100%;
            height: 90px;
            background: var(--surface);
            border-radius: 15px;
            display: flex;
            align-items: center;
            padding: 10px;
            box-sizing: border-box;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid transparent;
        }
        .playlist-item:hover { background: #1a1a1a; transform: translateY(-2px); }
        .playlist-item.active { border-color: var(--accent); background: #151515; box-shadow: 0 0 15px rgba(0,210,255,0.1); }

        .playlist-item img {
            width: 55px;
            height: 70px;
            object-fit: cover;
            border-radius: 10px;
            margin-right: 15px;
            background: #000;
        }

        .item-info { overflow: hidden; flex: 1; }
        .item-info strong { display: block; font-size: 0.9rem; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .item-info span { color: var(--text-dim); font-size: 0.75rem; }

        #player-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        .video-fixed-box {
            width: 1280px;
            height: 720px;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            border: 1px solid #222;
        }
        iframe { width: 100%; height: 100%; border: none; }

        footer {
            height: 75px;
            background: rgba(10, 10, 10, 0.98);
            backdrop-filter: blur(15px);
            border-top: 1px solid #1a1a1a;
            display: flex;
            align-items: center;
            padding: 0 25px;
            justify-content: space-between;
            z-index: 100;
        }

        .now-playing { display: flex; align-items: center; gap: 15px; max-width: 70%; }
        .status-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 10px var(--accent); display: none; }
        
        .now-playing-info { overflow: hidden; }
        .now-playing-label { font-size: 0.65rem; color: var(--accent); font-weight: bold; text-transform: uppercase; margin-bottom: 2px; display: block; }
        #currentTitle { font-size: 0.9rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; color: #eee; }

        .btn-add-list {
            background: var(--accent);
            color: #000;
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            border: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-add-list:hover { opacity: 0.9; transform: scale(1.05); }

        @media (max-width: 1400px) { .video-fixed-box { width: 90vw; height: calc(90vw * 0.5625); } }
        @media (max-width: 850px) { 
            main { flex-direction: column-reverse; } 
            #sidebar { width: 100%; height: 50%; border-right: none; border-top: 1px solid #1a1a1a; }
        }
    </style>
</head>
<body>

    <main>
        <aside id="sidebar">
            <div class="side-header">Filmondo</div>
            <div class="search-wrapper">
                <input type="text" id="searchBox" placeholder="Film ara..." oninput="handleSearch()">
            </div>
            <div id="playlist-container">
                <div id="virtual-list"></div>
            </div>
        </aside>

        <section id="player-area">
            <div class="video-fixed-box" id="playerWrapper">
                <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; color:#333;">
                    <span style="font-size: 3rem;">✦</span>
                    <p style="font-size: 0.75rem; letter-spacing: 2px; margin-top: 10px;">SEÇİM BEKLENİYOR</p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="now-playing">
            <div class="status-dot" id="activeDot"></div>
            <div class="now-playing-info">
                <span class="now-playing-label" id="statusText">Boşta</span>
                <span id="currentTitle">Henüz bir medya seçilmedi</span>
            </div>
        </div>

        <div class="footer-actions">
            <label class="btn-add-list">
                <span>+ LİSTE EKLE</span>
                <input type="file" id="m3uInput" hidden>
            </label>
        </div>
    </footer>

    <script>
        let allData = [];
        let filteredData = [];
        let activeUrl = "";
        const itemHeight = 102; 
        const container = document.getElementById('playlist-container');
        const virtualList = document.getElementById('virtual-list');
        const currentTitle = document.getElementById('currentTitle');
        const statusText = document.getElementById('statusText');
        const activeDot = document.getElementById('activeDot');

        window.addEventListener('DOMContentLoaded', () => {
            checkAutoLoad();
        });

        function checkAutoLoad() {
            fetch('list.m3u')
                .then(response => {
                    if (response.ok) return response.text();
                    throw new Error('Dosya bulunamadı');
                })
                .then(text => {
                    console.log('list.m3u bulundu, yükleniyor...');
                    parseM3U(text);
                })
                .catch(err => console.log('Otomatik liste yüklenemedi (list.m3u bulunamadı).'));
        }

        document.getElementById('m3uInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = e => parseM3U(e.target.result);
            reader.readAsText(file);
        });

        function parseM3U(content) {
            allData = [];
            const lines = content.split('\n');
            let temp = {};
            
            // Benzersizliği kontrol etmek için Set yapıları
            const seenUrls = new Set();
            const seenNames = new Set();

            for (let line of lines) {
                line = line.trim();
                if (line.startsWith('#EXTINF:')) {
                    const logoMatch = line.match(/tvg-logo="([^"]+)"/);
                    temp.logo = logoMatch ? logoMatch[1] : "";
                    temp.name = line.split(',').pop().trim();
                } else if (line.startsWith('http')) {
                    temp.url = line;
                    
                    const normalizedName = temp.name ? temp.name.toLowerCase() : "";

                    // Eğer URL veya Film Adı daha önce listeye eklenmemişse ekle
                    if (!seenUrls.has(temp.url) && !seenNames.has(normalizedName)) {
                        seenUrls.add(temp.url);
                        seenNames.add(normalizedName);
                        allData.push({...temp});
                    }
                    temp = {};
                }
            }
            filteredData = [...allData];
            updateVirtualList();
        }

        function updateVirtualList() {
            virtualList.style.height = (filteredData.length * itemHeight) + 'px';
            renderVisibleItems();
        }

        function renderVisibleItems() {
            const start = Math.floor(container.scrollTop / itemHeight);
            const end = Math.min(filteredData.length - 1, Math.ceil((container.scrollTop + container.clientHeight) / itemHeight));
            
            virtualList.innerHTML = "";
            for (let i = start; i <= end; i++) {
                const item = filteredData[i];
                const div = document.createElement('div');
                div.className = 'playlist-item' + (activeUrl === item.url ? ' active' : '');
                div.style.top = (i * itemHeight) + 'px';
                div.innerHTML = `
                    <img src="${item.logo || 'https://via.placeholder.com/55x70/111/444?text=Film'}" loading="lazy">
                    <div class="item-info">
                        <strong>${item.name}</strong>
                        <span>Medyayı Oynat</span>
                    </div>
                `;
                div.onclick = () => playVideo(item);
                virtualList.appendChild(div);
            }
        }

        function playVideo(item) {
            activeUrl = item.url;
            currentTitle.innerText = item.name;
            statusText.innerText = "Oynatılıyor";
            activeDot.style.display = "block";
            
            renderVisibleItems();
            document.getElementById('playerWrapper').innerHTML = `
                <iframe src="${item.url}" allowfullscreen allow="autoplay; fullscreen"></iframe>
            `;
        }

        function handleSearch() {
            const q = document.getElementById('searchBox').value.toLowerCase();
            filteredData = allData.filter(d => d.name.toLowerCase().includes(q));
            container.scrollTop = 0;
            updateVirtualList();
        }

        container.addEventListener('scroll', renderVisibleItems);
    </script>
</body>
</html>
