<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="apple-touch-icon" sizes="180x180" href="icons/wnmp.png">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Winamp">
    <title>Winamp X</title>
    <style>
        /* Mobil Reset ve Tam Ekran Uygulama Hissi */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html {
             scrollbar-color: #8b5cf6 #1e1b4b;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #1A1A1A; 
            color: #00E100; 
            margin: 0;
            padding:2px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        /* Ana Winamp Paneli */
        .winamp-container {
            background-color: #28292D; 
            border: 3px solid #46484D;
            border-top-color: #6C6F75;
            border-left-color: #6C6F75;
            box-shadow: inset -2px -2px 0px #0F1012, inset 2px 2px 0px #6C6F75, 0px 10px 25px rgba(0,0,0,0.7);
            width: 100%;
            max-width: 400px; 
            padding:12px;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* Winamp Başlık Çubuğu */
        .winamp-titlebar {
            background: linear-gradient(90deg, #03035A, #008484);
            color: #D2D4D7;
            font-size: 12px;
            font-weight: bold;
            padding: 5px 8px;
            text-align: left;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid #1A1A1A;
        }

        #fileInput {
            display: none;
        }

        /* Dosya Seçme Butonu */
        label {
            display: block;
            padding: 12px;
            background-color: #3C3D43;
            color: #00E100;
            border: 2px solid #5A5C64;
            border-right-color: #111214;
            border-bottom-color: #111214;
            cursor: pointer;
            font-size: 13px;
            text-transform: uppercase;
            font-weight: bold;
            text-shadow: 1px 1px 0px #000;
            text-align: center;
        }

        label:hover {
            background-color: #464850;
        }

        /* Kontrol Butonları */
        .controls {
            display: flex;
            gap: 4px;
        }

        .controls button {
            flex: 1;
            padding: 15px 0; 
            border: 2px solid #5A5C64;
            border-top-color: #7E818B;
            border-left-color: #7E818B;
            background-color: #3C3D43;
            color: #D2D4D7;
            font-family: Arial, sans-serif;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            text-shadow: 1px 1px 0px #000;
        }

        .controls button:active, .controls button.active {
            background-color: #1A1A1D;
            border: 2px solid #111214;
            border-right-color: #5A5C64;
            border-bottom-color: #5A5C64;
            color: #FF9900; 
        }

        /* Winamp Dijital Ekranı */
        .winamp-display {
            background-color: #000000;
            border: 2px solid #1A1A1D;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 4px;
            box-shadow: inset 1px 1px 3px rgba(0,0,0,0.8);
        }

        #trackNameDisplay {
            font-size: 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
            color: #00E100;
            text-shadow: 0 0 2px rgba(0, 225, 0, 0.6);
            text-align: left;
            height: 16px;
        }

        /* Zaman Göstergesi */
        #timeDisplay {
            font-family: 'Courier New', Courier, monospace;
            font-size: 28px;
            font-weight: bold;
            color: #FF9300; 
            text-shadow: 0 0 4px rgba(255, 147, 0, 0.7);
            letter-spacing: 1px;
        }

        /* İlerleme Çubuğu (Slider) */
        #progressBar {
            width: 100%;
            -webkit-appearance: none;
            appearance: none;
            height: 14px;
            background: #111214;
            border: 2px solid #3C3D43;
            outline: none;
            margin: 6px 0;
        }

        #progressBar::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 26px; 
            height: 12px;
            background: #3C3D43;
            border: 2px solid #7E818B;
            border-right-color: #111214;
            border-bottom-color: #111214;
            cursor: pointer;
        }

        /* Winamp Playlist (Şarkı Listesi) */
        #playlist {
            list-style: none;
            padding: 5px;
            background-color: #000000;
            border: 2px solid #3C3D43;
            height: 260px; 
            margin: 0;
            overflow-y: auto;
            text-align: left;
            font-size: 13px;
            color: #00E100;
        }

        /* Playlist Scrollbar Tasarımı */
        #playlist::-webkit-scrollbar {
            width: 10px;
        }
        #playlist::-webkit-scrollbar-track {
            background: #111214;
        }
        #playlist::-webkit-scrollbar-thumb {
            background: #3C3D43;
            border: 1px solid #5A5C64;
        }

        #playlist li {
            padding: 9px 6px; 
            border-bottom: 1px solid #111214;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Aktif Parça Seçimi */
        #playlist li.active {
            color: #FFFFFF; 
            background-color: #020266;
        }
    </style>
</head>
<body>

    <div class="winamp-container">
        <div class="winamp-titlebar">WINAMP 0.0 - MULTI AUDIO</div>
        
        <input type="file" id="fileInput" accept=".mp3,.wav" multiple />
        <label for="fileInput">Müzik Ekle (MP3 / WAV)</label>

        <div class="winamp-display">
            <div id="trackNameDisplay">*** DOSYA SEÇİNİZ ***</div>
            <div id="timeDisplay">
                <span id="currentTime">00:00</span>
            </div>
        </div>

        <input type="range" id="progressBar" value="0" min="0" max="100">

        <div class="controls">
            <button id="prevTrack"><<</button>
            <button id="playPause">PLAY</button>
            <button id="nextTrack">>></button>
        </div>

        <div class="controls">
            <button id="repeatMode">REP</button>
            <button id="shuffle">SHUF</button>
            <button id="clearPlaylist" style="color: #FF5555;">CLR</button>
        </div>

        <ul id="playlist"></ul>
    </div>

    <audio id="audioPlayer"></audio>

    <script>
        const fileInput = document.getElementById('fileInput');
        const audioPlayer = document.getElementById('audioPlayer');
        const playPauseButton = document.getElementById('playPause');
        const prevTrackButton = document.getElementById('prevTrack');
        const nextTrackButton = document.getElementById('nextTrack');
        const repeatButton = document.getElementById('repeatMode');
        const shuffleButton = document.getElementById('shuffle');
        const clearButton = document.getElementById('clearPlaylist');
        const playlist = document.getElementById('playlist');
        const progressBar = document.getElementById('progressBar');
        const trackNameDisplay = document.getElementById('trackNameDisplay');

        let tracks = [];
        let currentTrackIndex = -1;
        let repeatMode = 'all';
        let isShuffle = false;
        let isDragging = false;
        let db = null;

        // --- INDEXEDDB VERİTABANI AYARLARI ---
        const dbName = "WinampBrowserDB";
        const request = indexedDB.open(dbName, 1);

        request.onupgradeneeded = (e) => {
            db = e.target.result;
            if (!db.objectStoreNames.contains("tracks")) {
                db.createObjectStore("tracks", { keyPath: "id", autoIncrement: true });
            }
        };

        request.onsuccess = (e) => {
            db = e.target.result;
            loadTracksFromDB(); // Uygulama açıldığında kayıtlı listeyi yükle
        };

        request.onerror = () => {
            trackNameDisplay.textContent = "*** HAFIZA HATASI! ***";
        };

        // Veritabanındaki müzikleri çekip listeleme
        function loadTracksFromDB() {
            const transaction = db.transaction(["tracks"], "readonly");
            const store = transaction.objectStore("tracks");
            const getAllRequest = store.getAll();

            getAllRequest.onsuccess = () => {
                // Eski canlı URL'leri bellekten temizle (Memory leak önleme)
                tracks.forEach(track => { if(track.url) URL.revokeObjectURL(track.url); });

                tracks = getAllRequest.result.map(item => {
                    const fileURL = URL.createObjectURL(item.file);
                    return { id: item.id, name: item.name, url: fileURL };
                });

                playlist.innerHTML = "";
                tracks.forEach((track, index) => {
                    renderTrackInUI(track, index);
                });

                if (tracks.length > 0 && currentTrackIndex === -1) {
                    trackNameDisplay.textContent = "*** LİSTE HAZIR ***";
                }
            };
        }

        // Yeni şarkıyı veritabanına kaydetme
        function saveTrackToDB(file) {
            const transaction = db.transaction(["tracks"], "readwrite");
            const store = transaction.objectStore("tracks");
            const addRequest = store.add({ name: file.name, file: file });

            addRequest.onsuccess = () => {
                loadTracksFromDB(); // Başarılıysa listeyi tazelemek için çağır
            };
        }

        // Tek bir şarkıyı veritabanından silme
        function deleteTrackFromDB(id) {
            const transaction = db.transaction(["tracks"], "readwrite");
            const store = transaction.objectStore("tracks");
            store.delete(id);
        }

        // --- ARAYÜZ VE OYNATMA MANTIĞI ---
        function renderTrackInUI(track, index) {
            const listItem = document.createElement('li');
            const cleanName = track.name.replace(/\.(mp3|wav)$/i, '');
            listItem.textContent = `${index + 1}. ${cleanName}`;
            listItem.title = "Silmek için çift tıklayın";
            
            // Tek Tık: Şarkıyı Çal
            listItem.addEventListener('click', () => {
                currentTrackIndex = index;
                playTrack(currentTrackIndex);
            });
            
            // Çift Tık: Şarkıyı Tek Tek Sil
            listItem.addEventListener('dblclick', () => {
                deleteTrackFromDB(track.id); // Veritabanından uçur
                
                if (index === currentTrackIndex) {
                    audioPlayer.pause();
                    audioPlayer.src = "";
                    playPauseButton.classList.remove('active');
                    playPauseButton.textContent = 'PLAY';
                    trackNameDisplay.textContent = "*** DURDURULDU ***";
                    currentTrackIndex = -1;
                } else if (index < currentTrackIndex) {
                    currentTrackIndex--; // Sıra kaymasın diye indeksi koru
                }
                
                URL.revokeObjectURL(track.url); // Belleği rahatlat
                tracks.splice(index, 1);
                listItem.remove();
                
                // Kalan şarkıların numaralarını arayüzde güncelle
                Array.from(playlist.children).forEach((li, i) => {
                    const cName = tracks[i].name.replace(/\.(mp3|wav)$/i, '');
                    li.textContent = `${i + 1}. ${cName}`;
                });
            });

            playlist.appendChild(listItem);
        }

        // Yeni Dosya Seçildiğinde
        fileInput.addEventListener('change', (event) => {
            const files = Array.from(event.target.files);
            files.forEach((file) => {
                const fileNameLower = file.name.toLowerCase();
                const isMp3 = file.type === 'audio/mpeg' || fileNameLower.endsWith('.mp3');
                const isWav = file.type === 'audio/wav' || file.type === 'audio/x-wav' || fileNameLower.endsWith('.wav');

                if (isMp3 || isWav) {
                    saveTrackToDB(file);
                } else {
                    alert('Lütfen sadece MP3 veya WAV dosyaları seçin.');
                }
            });
        });

        // Tüm Listeyi Temizleme (CLR Butonu)
        clearButton.addEventListener('click', () => {
            if (tracks.length === 0) return;

            if (confirm("Çalma listesindeki tüm şarkıları kalıcı olarak silmek istediğinize emin misiniz?")) {
                const transaction = db.transaction(["tracks"], "readwrite");
                const store = transaction.objectStore("tracks");
                const clearRequest = store.clear(); // DB içindeki her şeyi temizler

                clearRequest.onsuccess = () => {
                    tracks.forEach(track => URL.revokeObjectURL(track.url));
                    tracks = [];
                    currentTrackIndex = -1;
                    
                    audioPlayer.pause();
                    audioPlayer.src = "";
                    
                    playlist.innerHTML = "";
                    playPauseButton.classList.remove('active');
                    playPauseButton.textContent = 'PLAY';
                    trackNameDisplay.textContent = "*** LİSTE TEMİZLENDİ ***";
                };
            }
        });

        audioPlayer.addEventListener('ended', () => { handleEnd(); });

        playPauseButton.addEventListener('click', () => {
            if (currentTrackIndex === -1 && tracks.length > 0) {
                currentTrackIndex = 0;
                playTrack(currentTrackIndex);
            } else if (audioPlayer.paused && tracks.length > 0) {
                audioPlayer.play();
                playPauseButton.classList.add('active');
                playPauseButton.textContent = 'PAUSE';
            } else if (tracks.length > 0) {
                audioPlayer.pause();
                playPauseButton.classList.remove('active');
                playPauseButton.textContent = 'PLAY';
            }
        });

        prevTrackButton.addEventListener('click', () => {
            if (currentTrackIndex > 0) {
                currentTrackIndex--;
                playTrack(currentTrackIndex);
            } else if (repeatMode === 'all' && tracks.length > 0) {
                currentTrackIndex = tracks.length - 1;
                playTrack(currentTrackIndex);
            }
        });

        nextTrackButton.addEventListener('click', () => { nextTrack(); });

        repeatButton.addEventListener('click', () => {
            switch (repeatMode) {
                case 'all':
                    repeatMode = 'one';
                    repeatButton.classList.add('active');
                    repeatButton.textContent = 'REP [1]';
                    break;
                case 'one':
                    repeatMode = 'none';
                    repeatButton.classList.remove('active');
                    repeatButton.textContent = 'REP [X]';
                    break;
                default:
                    repeatMode = 'all';
                    repeatButton.classList.add('active');
                    repeatButton.textContent = 'REP';
            }
        });

        shuffleButton.addEventListener('click', () => {
            isShuffle = !isShuffle;
            if (isShuffle) { shuffleButton.classList.add('active'); } 
            else { shuffleButton.classList.remove('active'); }
        });

        function playTrack(index) {
            Array.from(playlist.children).forEach((item, i) => {
                item.classList.remove('active');
                if (i === index) item.classList.add('active');
            });
            audioPlayer.src = tracks[index].url;
            audioPlayer.play();
            playPauseButton.classList.add('active');
            playPauseButton.textContent = 'PAUSE';
            trackNameDisplay.textContent = `${index + 1}. ${tracks[index].name}`;
        }

        function nextTrack() {
            if (tracks.length === 0) return;
            if (isShuffle) {
                currentTrackIndex = Math.floor(Math.random() * tracks.length);
            } else if (currentTrackIndex < tracks.length - 1) {
                currentTrackIndex++;
            } else if (repeatMode === 'all') {
                currentTrackIndex = 0;
            } else {
                return;
            }
            playTrack(currentTrackIndex);
        }

        function handleEnd() {
            if (repeatMode === 'one') { playTrack(currentTrackIndex); } 
            else { nextTrack(); }
        }

        const currentTimeDisplay = document.getElementById('currentTime');

        audioPlayer.addEventListener('timeupdate', () => {
            if (!isDragging && audioPlayer.duration) {
                progressBar.value = (audioPlayer.currentTime / audioPlayer.duration) * 100;
            }
            currentTimeDisplay.textContent = formatTime(audioPlayer.currentTime);
        });

        progressBar.addEventListener('input', () => { isDragging = true; });
        progressBar.addEventListener('change', () => {
            isDragging = false;
            if (audioPlayer.duration) {
                audioPlayer.currentTime = (progressBar.value / 100) * audioPlayer.duration;
            }
        });

        function formatTime(seconds) {
            if (isNaN(seconds)) return "00:00";
            const minutes = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${minutes.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        if ('mediaSession' in navigator) {
            navigator.mediaSession.setActionHandler('play', () => { audioPlayer.play(); });
            navigator.mediaSession.setActionHandler('pause', () => { audioPlayer.pause(); });
            navigator.mediaSession.setActionHandler('previoustrack', () => { prevTrackButton.click(); });
            navigator.mediaSession.setActionHandler('nexttrack', () => { nextTrackButton.click(); });
        }
    </script>
</body>
</html>
